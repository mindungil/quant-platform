      retries: 12
  etf-agent:
    build:
      context: ./services/etf-agent
    env_file:
      - .env.example
    ports:
      - "8015:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12
  stock-agent:
    build:
      context: ./services/stock-agent
    env_file:
      - .env.example
    ports:
      - "8016:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file:
      - .env.example
    ports:
      - "8017:8000"
    depends_on:
      auth-service:
        condition: service_healthy
      signal-service:
        condition: service_healthy
      memory-service:
        condition: service_healthy
      strategy-registry:
        condition: service_healthy
      order-service:
        condition: service_healthy
      credential-store:
        condition: service_healthy
      risk-service:
        condition: service_healthy
      portfolio-service:
        condition: service_healthy
      statistics-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 15
  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    env_file:
      - .env.example
    ports:
      - "8018:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 15

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file:
      - .env.example
    ports:
      - "8019:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 15

  external-data-service:
    build:
      context: ./services/external-data-service
    env_file:
      - .env.example
    ports:
      - "8020:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  llm-gateway:
    build:
      context: ./services/llm-gateway
    env_file:
      - .env.example
    ports:
      - "8021:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  nats:
    image: nats:2.11-alpine
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4222"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d platform"]
      interval: 10s
      timeout: 5s
      retries: 12

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: market
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d market"]
      interval: 10s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v3.4.1
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      api-gateway:
        condition: service_healthy
      auth-service:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.6.0
    profiles: ["observability"]
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started
