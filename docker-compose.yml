services:
  market-data:
    build:
      context: .
      dockerfile: services/market-data/Dockerfile
    env_file:
      - .env.example
    ports:
      - "8001:8000"
    depends_on:
      nats:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  feature-store:
    build:
