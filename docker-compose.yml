# =============================================================
# Quant Platform — Simplified Compose (5 containers)
#
#   backend   — all Python microservices (20 uvicorn processes)
#   frontend  — Next.js product UI
#   db        — TimescaleDB + pgvector (single database server)
#   redis     — cache + realtime pub/sub
#   nats      — JetStream event bus
#
# Optional: prometheus + grafana via --profile observability
# =============================================================

services:

  # ---- Infrastructure ----

  db:
    build:
      context: ./infra/db
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d platform && pg_isready -U postgres -d market"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.11-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4222"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Application ----

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env.example
    ports:
      - "8001:8001"   # market-data
      - "8002:8002"   # feature-store
      - "8003:8003"   # signal-service
      - "8004:8004"   # memory-service
      - "8005:8005"   # strategy-registry
      - "8006:8006"   # crypto-agent
      - "8007:8007"   # backtest-service
      - "8008:8008"   # exchange-adapter
      - "8009:8009"   # risk-service
      - "8010:8010"   # credential-store
      - "8011:8011"   # order-service
      - "8012:8012"   # portfolio-service
      - "8013:8013"   # statistics-service
      - "8014:8014"   # orchestrator-agent
      - "8015:8015"   # etf-agent
      - "8016:8016"   # stock-agent
      - "8017:8017"   # api-gateway
      - "8019:8019"   # auth-service
      - "8020:8020"   # external-data-service
      - "8021:8021"   # llm-gateway
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8017/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    env_file:
      - .env.example
    environment:
      - API_GATEWAY_BASE_URL=http://backend:8017
    ports:
      - "8018:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- Observability (optional) ----

  prometheus:
    image: prom/prometheus:v3.4.1
    profiles: ["observability"]
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.6.0
    profiles: ["observability"]
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  db-data:
