---
# Sealed secrets for production deployment.
# Generate with:
#   kubeseal --format yaml < secret-raw.yaml > sealed-secrets.yaml
#
# Raw secret template (DO NOT commit this — generate locally):
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: quant-secrets
#   namespace: quant
# type: Opaque
# stringData:
#   JWT_SECRET: "<generate with: openssl rand -hex 32>"
#   CREDENTIAL_ENCRYPTION_KEY: "<generate with: openssl rand -hex 32>"
#   POSTGRES_PASSWORD: "<strong password>"
#   REDIS_PASSWORD: "<strong password>"
#   BINANCE_API_KEY: "<your key>"
#   BINANCE_API_SECRET: "<your secret>"
#   UPBIT_ACCESS_KEY: "<your key>"
#   UPBIT_SECRET_KEY: "<your secret>"
#   INTERNAL_ADMIN_SECRET: "<generate with: openssl rand -hex 16>"

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: quant-secrets
  namespace: quant
spec:
  encryptedData:
    # Replace these with actual sealed values after running kubeseal
    JWT_SECRET: "PLACEHOLDER_SEAL_WITH_KUBESEAL"
    CREDENTIAL_ENCRYPTION_KEY: "PLACEHOLDER_SEAL_WITH_KUBESEAL"
    POSTGRES_PASSWORD: "PLACEHOLDER_SEAL_WITH_KUBESEAL"
    REDIS_PASSWORD: "PLACEHOLDER_SEAL_WITH_KUBESEAL"
    INTERNAL_ADMIN_SECRET: "PLACEHOLDER_SEAL_WITH_KUBESEAL"
  template:
    metadata:
      name: quant-secrets
      namespace: quant
    type: Opaque
