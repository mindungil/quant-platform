global:
  scrape_interval: 15s

scrape_configs:
  - job_name: quant-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - "backend:8001"   # market-data
          - "backend:8002"   # feature-store
          - "backend:8003"   # signal-service
          - "backend:8006"   # crypto-agent
          - "backend:8008"   # exchange-adapter
          - "backend:8009"   # risk-service
          - "backend:8011"   # order-service
          - "backend:8012"   # portfolio-service
          - "backend:8013"   # statistics-service
          - "backend:8017"   # api-gateway
          - "backend:8019"   # auth-service
