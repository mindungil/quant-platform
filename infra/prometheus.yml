global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:8000"]

  - job_name: market-data
    metrics_path: /metrics
    static_configs:
      - targets: ["market-data:8000"]

  - job_name: feature-store
    metrics_path: /metrics
    static_configs:
      - targets: ["feature-store:8000"]

  - job_name: signal-service
    metrics_path: /metrics
    static_configs:
      - targets: ["signal-service:8000"]

  - job_name: crypto-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["crypto-agent:8000"]

  - job_name: risk-service
    metrics_path: /metrics
    static_configs:
      - targets: ["risk-service:8000"]

  - job_name: order-service
    metrics_path: /metrics
    static_configs:
      - targets: ["order-service:8000"]

  - job_name: exchange-adapter
    metrics_path: /metrics
    static_configs:
      - targets: ["exchange-adapter:8000"]

  - job_name: portfolio-service
    metrics_path: /metrics
    static_configs:
      - targets: ["portfolio-service:8000"]

  - job_name: statistics-service
    metrics_path: /metrics
    static_configs:
      - targets: ["statistics-service:8000"]
