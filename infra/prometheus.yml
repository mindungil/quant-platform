global:
  scrape_interval: 15s
  evaluation_interval: 60s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: 'quant-intelligence'
    static_configs:
      - targets:
        - 'intelligence:8006'  # crypto-agent
        - 'intelligence:8014'  # orchestrator-agent
        - 'intelligence:8015'  # etf-agent
        - 'intelligence:8016'  # stock-agent
    metrics_path: '/metrics'

  - job_name: 'quant-execution'
    static_configs:
      - targets:
        - 'execution:8008'  # exchange-adapter
        - 'execution:8009'  # risk-service
        - 'execution:8010'  # credential-store
        - 'execution:8011'  # order-service
        - 'execution:8012'  # portfolio-service
    metrics_path: '/metrics'

  - job_name: 'quant-strategy-lab'
    static_configs:
      - targets:
        - 'strategy-lab:8004'  # memory-service
        - 'strategy-lab:8005'  # strategy-registry
        - 'strategy-lab:8007'  # backtest-service
        - 'strategy-lab:8013'  # statistics-service
    metrics_path: '/metrics'

  - job_name: 'quant-market-pipeline'
    static_configs:
      - targets:
        - 'market-pipeline:8001'  # market-data
        - 'market-pipeline:8002'  # feature-store
        - 'market-pipeline:8003'  # signal-service
        - 'market-pipeline:8020'  # external-data-service
    metrics_path: '/metrics'

  - job_name: 'quant-platform'
    static_configs:
      - targets:
        - 'platform:8017'  # api-gateway
        - 'platform:8019'  # auth-service
    metrics_path: '/metrics'

  - job_name: 'quant-llm-tools'
    static_configs:
      - targets:
        - 'llm-tools:8021'  # llm-gateway
    metrics_path: '/metrics'

  - job_name: 'quant-v3-learning-loop'
    static_configs:
      - targets:
        - 'learning-loop:9100'  # V3 #1 daemon — Prometheus metric exporter
    metrics_path: '/metrics'

  - job_name: 'quant-v4-reoptimizer'
    static_configs:
      - targets:
        - 'reoptimizer:9101'  # V4-4 reopt daemon
    metrics_path: '/metrics'

  - job_name: 'quant-v4-gp-discovery'
    static_configs:
      - targets:
        - 'gp-discovery:9102'  # V4-3 GP miner daemon
    metrics_path: '/metrics'
