name: engine-tests

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:

# Lightweight CI: only the profit-engine test suite (93+ tests, ~20 s).
# We do NOT install the 22 microservices here — that's brittle and the
# unit tests in this repo's `tests/` directory cover the engine code we
# actually care about. Service-level integration tests live elsewhere.

jobs:
  engine:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy pytest

      - name: Run engine tests
        run: |
          python -m pytest \
            tests/alpha \
            tests/backtest_engine \
            tests/optim \
            tests/regime \
            tests/features \
            tests/labels \
            tests/ml \
            tests/portfolio \
            -q --tb=short
