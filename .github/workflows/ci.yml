name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/check_public_boundary.py

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Run structured Ruff diagnostics
        shell: bash
        run: |
          set +e
          ruff check . --output-format=json > ruff.json
          status=$?
          printf '%s\n' "$status" > ruff-exit.txt
          cat ruff.json
          exit "$status"
      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics
          path: |
            ruff.json
            ruff-exit.txt
          if-no-files-found: error
          retention-days: 1
      - run: mypy
      - run: pytest
