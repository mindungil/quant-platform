name: Durable Runtime Import Fix

on:
  push:
    branches: [agent/durable-paper-runtime]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/durable-paper-runtime
      - name: Apply Ruff import grouping
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_paper_runtime.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "import pytest\nfrom quant_platform.contracts",
              "import pytest\n\nfrom quant_platform.contracts",
          )
          path.write_text(text, encoding="utf-8")
          PY
          git rm .github/workflows/durable-runtime-ruff-diagnostic.yml
      - name: Commit import fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_paper_runtime.py
          git commit -m "fix: normalize durable runtime test imports"
          git push origin HEAD:agent/durable-paper-runtime
