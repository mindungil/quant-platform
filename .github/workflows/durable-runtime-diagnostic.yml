name: Durable Runtime Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  mypy-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -e . mypy
      - name: Capture mypy diagnostics
        run: |
          set +e
          mypy --strict --python-version 3.11 --mypy-path src src/quant_platform/paper_runtime.py src/quant_platform/paper_runtime_contracts.py > mypy-diagnostics.txt 2>&1
          echo $? > mypy-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: durable-runtime-mypy
          path: |
            mypy-diagnostics.txt
            mypy-exit-code.txt
          if-no-files-found: error
