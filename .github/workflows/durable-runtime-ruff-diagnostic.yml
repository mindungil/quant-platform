name: Durable Runtime Ruff Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  ruff-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q ruff
      - name: Capture Ruff diagnostics
        run: |
          set +e
          ruff check . --output-format json > ruff-diagnostics.json
          echo $? > ruff-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: durable-runtime-ruff
          path: |
            ruff-diagnostics.json
            ruff-exit-code.txt
          if-no-files-found: error
