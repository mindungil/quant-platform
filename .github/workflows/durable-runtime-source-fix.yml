name: Durable Runtime Source Fix

on:
  push:
    branches: [agent/durable-paper-runtime]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/durable-paper-runtime
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply source fixes and remove diagnostics
        run: |
          python - <<'PY'
          from pathlib import Path

          runtime = Path("src/quant_platform/paper_runtime.py")
          text = runtime.read_text(encoding="utf-8")
          text = text.replace(
              "from collections import Counter\nfrom contextlib import contextmanager",
              "from collections import Counter\nfrom collections.abc import Iterator, Mapping\nfrom contextlib import contextmanager",
          )
          text = text.replace("from pathlib import Path\nfrom typing import Iterator, Mapping\n", "from pathlib import Path\n")
          text = text.replace(
              "            sequence = int(cursor.lastrowid)\n            self._append_journal(",
              "            lastrowid = cursor.lastrowid\n            if lastrowid is None:\n                raise PaperRecoveryIntegrityError(\n                    \"SQLite did not return an operation sequence\"\n                )\n            sequence = lastrowid\n            self._append_journal(",
          )
          text = text.replace(
              "        if row is None:\n            raise KeyError(operation_id)\n        return row\n\n    def _metadata_value",
              "        if row is None:\n            raise KeyError(operation_id)\n        if not isinstance(row, sqlite3.Row):\n            raise PaperRecoveryIntegrityError(\n                \"SQLite row factory returned an invalid row\"\n            )\n        return row\n\n    def _metadata_value",
          )
          runtime.write_text(text, encoding="utf-8")

          test = Path("tests/test_paper_runtime.py")
          text = test.read_text(encoding="utf-8")
          text = text.replace(
              "from datetime import UTC, date, datetime, timedelta\nfrom decimal import Decimal\nfrom pathlib import Path\nimport sqlite3\n\nimport pytest\n\nfrom quant_platform.contracts",
              "import sqlite3\nfrom datetime import UTC, date, datetime, timedelta\nfrom decimal import Decimal\nfrom pathlib import Path\n\nimport pytest\nfrom quant_platform.contracts",
          )
          test.write_text(text, encoding="utf-8")

          Path("pyproject.toml").write_text(
              '''[build-system]\nrequires = ["hatchling>=1.25"]\nbuild-backend = "hatchling.build"\n\n[project]\nname = "quant-platform-core"\nversion = "0.1.0"\ndescription = "Deterministic open-core contracts for quantitative research, backtesting, risk controls, and paper-trading orchestration."\nreadme = "README.md"\nrequires-python = ">=3.11"\nlicense = {text = "Apache-2.0"}\nauthors = [{name = "mindungil"}]\ndependencies = []\n\n[project.optional-dependencies]\ndev = [\n  "pytest>=8.2",\n  "ruff>=0.6",\n  "mypy>=1.11",\n]\n\n[tool.hatch.build.targets.wheel]\npackages = ["src/quant_platform"]\n\n[tool.pytest.ini_options]\naddopts = "-q"\ntestpaths = ["tests"]\n\n[tool.ruff]\ntarget-version = "py311"\nline-length = 100\n\n[tool.ruff.lint]\nselect = ["E", "F", "I", "UP", "B"]\nignore = ["E501"]\n\n[tool.mypy]\npython_version = "3.11"\nstrict = true\npackages = ["quant_platform"]\nmypy_path = "src"\n''',
              encoding="utf-8",
          )
          PY
          git rm .github/workflows/durable-runtime-diagnostic.yml
          git rm .github/workflows/durable-runtime-source-fix.yml
      - name: Commit source fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/quant_platform/paper_runtime.py tests/test_paper_runtime.py pyproject.toml
          git commit -m "fix: satisfy durable runtime static checks"
          git push origin HEAD:agent/durable-paper-runtime
